<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Server – Minecraft Bedrock Indonesia</title>
<meta name="description" content="Nano Server adalah server Minecraft Bedrock Indonesia dengan komunitas aktif, fitur lengkap, dan pengalaman survival yang seru.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-dark: #00552e;
    --green-glow: rgba(0,255,136,0.35);
    --bg: #080e0a;
    --bg2: #0d1610;
    --bg3: #111d14;
    --card-bg: rgba(10,26,14,0.72);
    --glass: rgba(0,255,136,0.04);
    --border: rgba(0,255,136,0.18);
    --text: #d4f0dc;
    --text-muted: #6a9478;
    --white: #ffffff;
    --pixel-size: 3px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    cursor: default;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

  /* ── PIXEL FONT ── */
  .font-pixel { font-family: 'Orbitron', monospace; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    height: 64px;
    background: rgba(8,14,10,0.82);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }
  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.15rem;
    color: var(--green);
    letter-spacing: 0.12em;
    text-shadow: 0 0 16px var(--green-glow);
    text-decoration: none;
  }
  .nav-logo span { color: var(--white); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--green); }
  .nav-join {
    background: transparent;
    border: 1.5px solid var(--green);
    color: var(--green);
    padding: 0.45rem 1.3rem;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
  }
  .nav-join:hover {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 22px var(--green-glow);
  }

  /* hamburger */
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { width: 24px; height: 2px; background: var(--green); transition: all 0.3s; border-radius: 2px; }

  /* ── HERO ── */
  #hero {
    position: relative;
    height: 100svh;
    min-height: 600px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  /* Minecraft-style pixel landscape background */
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      /* stars */
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 6%,  rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 18%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 25%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      /* sky gradient */
      linear-gradient(180deg,
        #020a04 0%,
        #061409 18%,
        #0a2010 35%,
        #0d2a14 50%,
        #142e18 60%,
        #1a3d20 68%,
        #1e4825 72%,
        #4a7c30 74%,   /* tree tops */
        #3d6b28 76%,
        #5a8f38 78%,
        #2d5e20 80%,   /* forest line */
        #5c8040 82%,   /* grass */
        #3a6b2a 84%,
        #4a7830 86%,
        #2f5522 88%,
        #1a3a10 90%,
        #0f2a09 100%
      );
    animation: heroShift 20s ease-in-out infinite alternate;
  }

  @keyframes heroShift {
    from { background-position: 0% 50%; }
    to   { background-position: 100% 50%; }
  }

  /* pixel grid overlay */
  .hero-grid {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* animated floating particles */
  .particles { position: absolute; inset: 0; z-index: 2; overflow: hidden; }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--green);
    opacity: 0;
    animation: floatUp var(--dur, 6s) var(--delay, 0s) infinite ease-in-out;
    border-radius: 1px;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    15%  { opacity: 0.8; }
    85%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-80vh) scale(1.2); }
  }

  .hero-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.75) 100%);
  }

  .hero-content {
    position: relative; z-index: 4;
    max-width: 820px;
    padding: 0 1.5rem;
    animation: heroFadeIn 1.2s ease both;
  }
  @keyframes heroFadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-badge {
    display: inline-block;
    padding: 0.3rem 1rem;
    border: 1px solid var(--green);
    border-radius: 2px;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 1.5rem;
    background: rgba(0,255,136,0.06);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--green-glow); }
    50% { box-shadow: 0 0 24px var(--green-glow), 0 0 48px rgba(0,255,136,0.1); }
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 900;
    line-height: 0.95;
    color: #fff;
    letter-spacing: 0.06em;
    text-shadow:
      0 0 30px rgba(0,255,136,0.5),
      0 0 80px rgba(0,255,136,0.2),
      0 4px 20px rgba(0,0,0,0.8);
    margin-bottom: 0.2em;
  }
  .hero-title .accent { color: var(--green); }

  .hero-sub {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--text);
    font-weight: 500;
    line-height: 1.6;
    max-width: 560px;
    margin: 1.2rem auto 2.4rem;
    opacity: 0.88;
  }

  .btn-glow {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 1rem 2.6rem;
    background: var(--green);
    color: #020a04;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 0 28px var(--green-glow), 0 4px 20px rgba(0,0,0,0.5);
  }
  .btn-glow::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-glow:hover::before { transform: translateX(100%); }
  .btn-glow:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 48px var(--green-glow), 0 0 96px rgba(0,255,136,0.15), 0 8px 30px rgba(0,0,0,0.5);
  }
  .btn-glow:active { transform: translateY(0); }

  .hero-scroll {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 4;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-muted);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: bounceDown 2s ease-in-out infinite;
  }
  .hero-scroll::after {
    content: '▼';
    color: var(--green);
    font-size: 0.8rem;
  }
  @keyframes bounceDown {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* ── SECTION COMMON ── */
  section { padding: 5rem 5vw; }
  .section-label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 0.8rem;
    font-weight: 600;
  }
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 1.2rem;
  }
  .section-title .accent { color: var(--green); }
  .section-desc {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text-muted);
    max-width: 640px;
  }
  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--green), transparent);
    margin: 1.2rem 0 2rem;
    border-radius: 2px;
  }

  /* ── ABOUT ── */
  #about {
    background: var(--bg2);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
  }
  .about-visual {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 4/3;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .about-visual-inner {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        0deg, transparent, transparent 31px, rgba(0,255,136,0.05) 31px, rgba(0,255,136,0.05) 32px
      ),
      repeating-linear-gradient(
        90deg, transparent, transparent 31px, rgba(0,255,136,0.05) 31px, rgba(0,255,136,0.05) 32px
      ),
      linear-gradient(135deg, #0a1f0e 0%, #142e18 40%, #1a4022 70%, #0d2010 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .mc-scene {
    font-size: 5rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .about-corner {
    position: absolute; bottom: 1rem; right: 1rem;
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    color: var(--green);
    letter-spacing: 0.15em;
    opacity: 0.5;
  }
  .about-stat-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 2rem;
  }
  .about-stat {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    text-align: center;
    transition: border-color 0.3s, transform 0.3s;
  }
  .about-stat:hover { border-color: var(--green); transform: translateY(-4px); }
  .about-stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green);
    display: block;
  }
  .about-stat-label { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.08em; }

  /* ── FEATURES ── */
  #features { background: var(--bg); }
  .features-header { text-align: center; margin-bottom: 3.5rem; }
  .features-header .divider { margin-inline: auto; }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  .feat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem 1.8rem;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
    transition: transform 0.35s, border-color 0.35s, box-shadow 0.35s;
    cursor: default;
  }
  .feat-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0,255,136,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.35s;
  }
  .feat-card:hover { transform: translateY(-8px); border-color: var(--green); box-shadow: 0 8px 40px rgba(0,255,136,0.12); }
  .feat-card:hover::before { opacity: 1; }
  .feat-icon {
    font-size: 2.6rem;
    margin-bottom: 1rem;
    display: block;
    filter: drop-shadow(0 0 8px rgba(0,255,136,0.4));
    transition: transform 0.3s;
  }
  .feat-card:hover .feat-icon { transform: scale(1.12) rotate(-5deg); }
  .feat-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.6rem;
    letter-spacing: 0.06em;
  }
  .feat-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; }
  .feat-card .corner-deco {
    position: absolute; top: 10px; right: 10px;
    width: 6px; height: 6px;
    border-top: 1px solid var(--green);
    border-right: 1px solid var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .feat-card:hover .corner-deco { opacity: 1; }

  /* ── SEASON ── */
  #season { background: var(--bg2); }
  .season-container { max-width: 900px; margin: 0 auto; }
  .season-banner {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
  }
  .season-banner-inner {
    padding: 2.5rem 2.5rem;
    background: linear-gradient(135deg, #0d2a14 0%, #1a4022 60%, #0a1f0e 100%);
    position: relative;
  }
  .season-banner-inner::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg, rgba(0,255,136,0.03) 0px, rgba(0,255,136,0.03) 1px, transparent 1px, transparent 48px),
      repeating-linear-gradient(0deg, rgba(0,255,136,0.03) 0px, rgba(0,255,136,0.03) 1px, transparent 1px, transparent 48px);
  }
  .season-tag {
    display: inline-block;
    background: var(--green);
    color: #020a04;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 0.2rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 1rem;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .season-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow);
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
  }
  .season-desc {
    color: var(--text-muted);
    font-size: 1rem;
    margin-top: 0.8rem;
    line-height: 1.65;
    max-width: 560px;
    position: relative; z-index: 1;
  }

  /* Season 3 banner */
  .season-next {
    background: linear-gradient(135deg, #1c0a2e 0%, #2a0f40 50%, #150824 100%);
    border: 1px solid rgba(160,80,255,0.3);
    border-radius: 10px;
    padding: 2.5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 2rem;
    position: relative;
    overflow: hidden;
  }
  .season-next::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 50%, rgba(160,80,255,0.1) 0%, transparent 60%);
  }
  .s3-tag {
    display: inline-block;
    background: rgba(160,80,255,0.2);
    color: #c97eff;
    border: 1px solid rgba(160,80,255,0.4);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 0.2rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 0.8rem;
  }
  .s3-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.06em;
  }
  .s3-date {
    color: #c97eff;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
  }
  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    min-width: 260px;
  }
  .cd-unit {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(160,80,255,0.3);
    border-radius: 6px;
    padding: 0.8rem 0.5rem;
    text-align: center;
    transition: border-color 0.3s;
  }
  .cd-unit:hover { border-color: #c97eff; }
  .cd-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: #c97eff;
    display: block;
    line-height: 1;
  }
  .cd-label { font-size: 0.6rem; letter-spacing: 0.15em; color: rgba(160,80,255,0.6); text-transform: uppercase; margin-top: 0.3rem; }

  /* ── GALLERY ── */
  #gallery { background: var(--bg); }
  .gallery-header { text-align: center; margin-bottom: 3rem; }
  .gallery-header .divider { margin-inline: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 220px);
    gap: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  .gal-item {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.35s, box-shadow 0.35s;
  }
  .gal-item:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0,255,136,0.15); z-index: 2; }
  .gal-bg {
    position: absolute; inset: 0;
    transition: transform 0.5s;
  }
  .gal-item:hover .gal-bg { transform: scale(1.08); }

  /* per-item Minecraft palette backgrounds */
  .gal-spawn .gal-bg { background: linear-gradient(135deg, #1a3a1e 0%, #2d5e32 30%, #4a8040 55%, #3a6b30 70%, #2a4d1c 85%, #1a2e10 100%); }
  .gal-village .gal-bg { background: linear-gradient(135deg, #3d2a10 0%, #6b4820 30%, #8c6030 55%, #7a5228 70%, #5a3c1a 85%, #3a2510 100%); }
  .gal-market .gal-bg { background: linear-gradient(135deg, #0a1a2e 0%, #1a3a5a 30%, #2a5a8a 55%, #1e4a78 70%, #142e56 85%, #0a1a3a 100%); }
  .gal-base .gal-bg { background: linear-gradient(135deg, #1e1e1e 0%, #3a3a3a 25%, #2a4a2a 45%, #1e3a1e 60%, #282828 80%, #1a1a1a 100%); }
  .gal-event .gal-bg { background: linear-gradient(135deg, #2e0a0a 0%, #5a1a1a 30%, #8a2a00 55%, #7a2000 70%, #5a1800 85%, #3a0a00 100%); }
  .gal-nether .gal-bg { background: linear-gradient(135deg, #3d0000 0%, #6b0000 25%, #8a1500 45%, #6b1000 60%, #4a0800 80%, #2e0000 100%); }

  /* pixel pattern overlay on each gallery item */
  .gal-item::before {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .gal-scene {
    position: absolute; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
  }
  .gal-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
  }
  .gal-label {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
    padding: 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .gal-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .gal-tag {
    font-size: 0.6rem;
